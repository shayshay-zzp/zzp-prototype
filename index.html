<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZZP — Nền tảng vận hành TikTok Shop</title>
  <link rel="stylesheet" href="css/zzp-design-system.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            zzp: { 50:'#f0fdfa',100:'#ccfbf1',200:'#99f6e4',300:'#5eead4',400:'#2dd4bf',500:'#14b8a6',600:'#0d9488',700:'#0f766e',800:'#115e59',900:'#134e4a' },
            tiktok: '#fe2c55'
          }
        }
      }
    }
  </script>
  <style>
    /* Chart + legacy — phần lớn UI trong zzp-design-system.css */
  </style>
</head>
<body class="zzp-app">
  <div id="app" class="zzp-shell">
    <aside id="sidebar" class="zzp-sidebar">
      <div class="zzp-sidebar-brand">
        <div class="zzp-brand-lockup">
          <div class="zzp-brand-icon"><i data-lucide="layers" class="w-5 h-5"></i></div>
          <div>
            <h1 class="zzp-brand-title">ZZP Platform</h1>
            <p class="zzp-brand-sub">Vận hành TikTok Shop</p>
          </div>
        </div>
      </div>
      <nav id="nav-menu" class="zzp-nav"></nav>
      <div class="zzp-sidebar-foot">Bản demo v2.0 · Dữ liệu mẫu</div>
    </aside>

    <div class="zzp-main">
      <header class="zzp-topbar">
        <div class="zzp-topbar-left">
          <button id="toggle-sidebar" class="zzp-icon-btn lg:hidden" aria-label="Menu">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <div>
            <h2 id="page-title" class="zzp-topbar-title">Tổng quan</h2>
            <p id="page-subtitle" class="zzp-topbar-sub">BeautyViet Official · TikTok Shop</p>
          </div>
        </div>
        <div class="zzp-topbar-right">
          <div id="health-badge" class="zzp-health-pill">
            <span class="zzp-health-dot"></span>
            Sức khỏe shop: <span id="health-score">78</span>%
          </div>
          <button id="notif-btn" class="zzp-icon-btn" aria-label="Thông báo">
            <i data-lucide="bell" class="w-5 h-5"></i>
            <span id="notif-count" class="zzp-notif-badge">5</span>
          </button>
          <div class="zzp-user-chip">
            <div class="zzp-user-avatar">BV</div>
            <div class="hidden md:block">
              <p class="zzp-user-name">Nguyễn Minh Anh</p>
              <p class="zzp-user-role">Shop Owner</p>
            </div>
          </div>
        </div>
      </header>

      <main id="main-content" class="zzp-content"></main>
    </div>

    <aside id="guide-rail" class="zzp-guide-rail">
      <div class="zzp-guide-head">
        <p class="zzp-guide-eyebrow">Hướng dẫn module</p>
        <p id="guide-rail-title" class="zzp-guide-title">Chọn mục menu</p>
      </div>
      <div id="guide-rail-content" class="zzp-guide-body"></div>
    </aside>
  </div>

  <!-- Notification Panel -->
  <div id="notif-panel" class="fixed inset-y-0 right-0 w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-50 flex flex-col">
    <div class="p-4 border-b flex items-center justify-between">
      <h3 class="font-semibold">Thông báo & Cảnh báo</h3>
      <button id="close-notif" class="p-1 rounded hover:bg-slate-100">&times;</button>
    </div>
    <div id="notif-list" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
  </div>
  <div id="notif-overlay" class="fixed inset-0 bg-black/20 z-40 hidden"></div>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/40" id="modal-overlay"></div>
    <div class="relative bg-white rounded-2xl shadow-xl max-w-lg w-full max-h-[85vh] overflow-y-auto" id="modal-body"></div>
  </div>

  <!-- Toast -->
  <div id="toast-container" class="fixed top-4 right-4 z-[60] space-y-2"></div>

  <!-- Hint tự động hóa — float, không chiếm layout -->
  <div id="automation-fab-root" class="fixed bottom-6 right-6 z-40 hidden flex flex-col items-end gap-2"></div>

  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/tiktok-metrics.js"></script>
  <script src="js/vi.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/module-ui.js"></script>
  <script src="js/setup-flow.js"></script>
  <script src="js/guides.js"></script>
  <script src="js/flows.js"></script>
  <script src="js/module-flows.js"></script>
  <script src="js/flow-step-screens.js"></script>
  <script src="js/flow-panels.js"></script>
  <script src="js/workflow-steps.js"></script>
  <script src="js/details.js"></script>
  <script src="js/module-layouts.js"></script>
  <script src="js/modules/module-tab-brief.js"></script>
  <script src="js/module-data-tabs.js"></script>
  <script src="js/data-layers.js"></script>
  <script src="js/chart-helpers.js"></script>
  <script src="js/design-system.js"></script>
  <script src="js/modules/onboarding/onboarding-core.js"></script>
  <script src="js/modules/onboarding/onboarding-page.js"></script>
  <script src="js/modules/store/store-meta.js"></script>
  <script src="js/modules/store/store-core.js"></script>
  <script src="js/modules/store/store-actions.js"></script>
  <script src="js/modules/store/tab-overview.js"></script>
  <script src="js/modules/store/tab-brand-kit.js"></script>
  <script src="js/modules/store/tab-decoration.js"></script>
  <script src="js/modules/store/tab-templates.js"></script>
  <script src="js/modules/store/tab-preview.js"></script>
  <script src="js/modules/store/tab-seo.js"></script>
  <script src="js/modules/store/store-index.js"></script>
  <script src="js/render.js"></script>
  <script src="js/init-phase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
